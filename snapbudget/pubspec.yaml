name: snapbudget
description: "SnapBudget - AI-powered fintech expense tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  camera: ^0.11.0
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
